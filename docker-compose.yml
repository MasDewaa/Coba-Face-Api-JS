version: '3.8'
services:
  faceapi:
    build: .
    ports:
      - "9005:8000"
    restart: unless-stopped
    environment:
      - TZ=Asia/Jakarta
      - DATABASE_URL=postgresql://faceapp:facepass@db:5432/facedb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=facedb
      - POSTGRES_USER=faceapp
      - POSTGRES_PASSWORD=facepass
      - TZ=Asia/Jakarta
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faceapp -d facedb"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
