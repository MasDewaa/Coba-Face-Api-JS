<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-TPMB Face ID - Production Ready</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f3f4f6; color: #1f2937; display: flex; flex-direction: column; align-items: center; padding: 2rem; margin: 0; }
        h1 { margin-bottom: 0.5rem; }
        p { color: #6b7280; margin-bottom: 2rem; }
        .container { display: flex; gap: 2rem; max-width: 1000px; width: 100%; }
        
        /* Area Kamera yang Diperbarui */
        .camera-section { flex: 1; display: flex; flex-direction: column; align-items: center; background: white; padding: 1rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .camera-wrapper { position: relative; width: 100%; max-width: 480px; border-radius: 8px; overflow: hidden; background: #000; }
        video { width: 100%; display: block; transform: scaleX(-1); /* Mirror effect */ }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        
        /* Overlay Instruksi */
        .instruction-overlay { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 20px; border-radius: 20px; font-weight: 600; font-size: 14px; text-align: center; width: 80%; z-index: 20; display: none; transition: background-color 0.3s; }
        
        .controls-section { flex: 1; display: flex; flex-direction: column; gap: 1.5rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h3 { margin-top: 0; margin-bottom: 1rem; color: #111827; }
        input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; border: none; border-radius: 6px; font-weight: 600; color: white; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover:not(:disabled) { background-color: #1d4ed8; }
        .btn-success { background-color: #059669; }
        .btn-success:hover:not(:disabled) { background-color: #047857; }
        .status-box { margin-top: 1rem; padding: 1rem; border-radius: 6px; background: #f8fafc; border: 1px solid #e2e8f0; font-family: monospace; white-space: pre-wrap; word-break: break-all; font-size: 14px; min-height: 80px; }
    </style>
</head>
<body>

    <h1>Sistem Face ID E-TPMB</h1>
    <p>Purwarupa Pengenalan Wajah dengan Python FastAPI</p>

    <div class="container">
        <!-- Area Kamera -->
        <div class="camera-section">
            <div class="camera-wrapper">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas"></canvas>
                <div id="instruction-overlay" class="instruction-overlay">Tatap layar untuk mulai...</div>
            </div>
            <small style="margin-top: 10px; color: #6b7280;">Pastikan wajah terlihat jelas dan pencahayaan cukup</small>
        </div>

        <!-- Area Kontrol -->
        <div class="controls-section">
            <!-- Flow 1: Pendaftaran -->
            <div class="card">
                <h3>1. Pendaftaran Pasien/Staf Baru</h3>
                <input type="text" id="input-name" placeholder="Masukkan Nama Lengkap">
                <button id="btn-register" class="btn-primary">📷 Registrasi 3 Tahap</button>
            </div>

            <!-- Flow 2: Pencarian / Identifikasi -->
            <div class="card">
                <h3>2. Identifikasi Wajah (Pencarian)</h3>
                <button id="btn-recognize" class="btn-success">🔍 Mulai Pindai Wajah</button>
            </div>

            <!-- Log Output -->
            <div class="card">
                <h3>Log Sistem</h3>
                <div id="log-output" class="status-box">Menunggu instruksi...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script>
        const el = {
            video: document.getElementById('video'),
            canvas: document.getElementById('canvas'),
            overlay: document.getElementById('instruction-overlay'),
            btnRegister: document.getElementById('btn-register'),
            btnRecognize: document.getElementById('btn-recognize'),
            inputName: document.getElementById('input-name'),
            log: document.getElementById('log-output')
        };

        const cfg = {
            apiBaseUrl: '/api/v1',
            modelUrl: '/models',
            detector: new faceapi.SsdMobilenetv1Options({ minConfidence: 0.3 }),
            maxLoop: 300,
            intervalMs: 80,
            blinkOpen: 0.24,
            blinkClose: 0.19,
            headMoveThreshold: 0.08,
            smileGain: 1.18,
            smileMin: 1.8,
            centerTolX: 0.14,
            centerTolY: 0.18,
            minFaceWidthRatio: 0.34,
            minFaceHeightRatio: 0.42
        };

        let modelsReady = false;
        const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

        function logMessage(msg, color = '#1f2937') {
            el.log.style.color = color;
            el.log.textContent = typeof msg === 'object' ? JSON.stringify(msg, null, 2) : msg;
        }

        function setOverlay(text, color = 'rgba(37, 99, 235, 0.9)', visible = true) {
            el.overlay.style.display = visible ? 'block' : 'none';
            el.overlay.style.background = color;
            el.overlay.innerText = text;
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            el.video.srcObject = stream;
            await new Promise((resolve) => {
                if (el.video.readyState >= 1) return resolve();
                el.video.onloadedmetadata = resolve;
            });
        }

        async function loadModels() {
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(cfg.modelUrl),
                faceapi.nets.faceLandmark68Net.loadFromUri(cfg.modelUrl)
            ]);
            modelsReady = true;
        }

        function getDisplaySize() {
            return { width: el.video.videoWidth, height: el.video.videoHeight };
        }

        function drawGuide(ctx, size, valid) {
            const cx = size.width / 2;
            const cy = size.height / 2;
            ctx.save();
            ctx.beginPath();
            ctx.ellipse(cx, cy, size.width * 0.2, size.height * 0.3, 0, 0, Math.PI * 2);
            ctx.lineWidth = 3;
            ctx.strokeStyle = valid ? 'rgba(5,150,105,0.95)' : 'rgba(251,191,36,0.95)';
            ctx.setLineDash([10, 6]);
            ctx.stroke();
            ctx.restore();
        }

        function faceGuideStatus(detection, size) {
            const box = detection.detection.box;
            const cx = box.x + (box.width / 2);
            const cy = box.y + (box.height / 2);
            const centered =
                Math.abs(cx - (size.width / 2)) / size.width <= cfg.centerTolX &&
                Math.abs(cy - (size.height / 2)) / size.height <= cfg.centerTolY;
            const closeUp = (box.width / size.width) >= cfg.minFaceWidthRatio &&
                (box.height / size.height) >= cfg.minFaceHeightRatio;
            if (!centered) return { ok: false, message: 'Posisikan wajah tepat di tengah frame panduan.' };
            if (!closeUp) return { ok: false, message: 'Dekatkan wajah (close-up) hingga memenuhi frame panduan.' };
            return { ok: true, message: '' };
        }

        const distance = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
        function calcEar(landmarks) {
            const ratio = (eye) => (distance(eye[1], eye[5]) + distance(eye[2], eye[4])) / (2 * distance(eye[0], eye[3]));
            return (ratio(landmarks.getLeftEye()) + ratio(landmarks.getRightEye())) / 2;
        }
        function calcYaw(landmarks) {
            const jaw = landmarks.getJawOutline();
            const noseTip = landmarks.getNose()[3];
            return (noseTip.x - jaw[0].x) / Math.max(1, jaw[16].x - jaw[0].x);
        }
        function calcSmile(landmarks) {
            const mouth = landmarks.getMouth();
            return distance(mouth[0], mouth[6]) / Math.max(1e-6, distance(mouth[3], mouth[9]));
        }

        async function captureBestBlob() {
            const snap = () => {
                const c = document.createElement('canvas');
                c.width = el.video.videoWidth;
                c.height = el.video.videoHeight;
                c.getContext('2d').drawImage(el.video, 0, 0, c.width, c.height);
                return new Promise((resolve, reject) =>
                    c.toBlob((blob) => blob ? resolve(blob) : reject(new Error('Gagal capture kamera.')), 'image/jpeg', 0.92)
                );
            };
            const shots = [await snap(), await snap(), await snap()];
            return shots.sort((a, b) => b.size - a.size)[0];
        }

        async function postImage(path, name) {
            const formData = new FormData();
            formData.append('image', await captureBestBlob(), 'capture.jpg');
            if (name) formData.append('name', name);
            const res = await fetch(`${cfg.apiBaseUrl}/${path}`, { method: 'POST', body: formData });
            const data = await res.json();
            if (!res.ok) throw new Error(data?.detail || 'Request gagal.');
            return data;
        }

        async function detectSingleWithGuide(ctx, size) {
            const detections = await faceapi.detectAllFaces(el.video, cfg.detector).withFaceLandmarks();
            const resized = faceapi.resizeResults(detections, size);
            ctx.clearRect(0, 0, el.canvas.width, el.canvas.height);
            faceapi.draw.drawDetections(el.canvas, resized);
            faceapi.draw.drawFaceLandmarks(el.canvas, resized);
            if (detections.length !== 1) {
                drawGuide(ctx, size, false);
                return { ok: false, reason: detections.length > 1 ? 'Pastikan hanya 1 wajah terlihat jelas!' : 'Wajah tidak terdeteksi. Tatap kamera.' };
            }
            const guide = faceGuideStatus(detections[0], size);
            drawGuide(ctx, size, guide.ok);
            return guide.ok ? { ok: true, landmarks: detections[0].landmarks } : { ok: false, reason: guide.message };
        }

        async function runGuidedRegistration(name) {
            const size = getDisplaySize();
            faceapi.matchDimensions(el.canvas, size);
            const ctx = el.canvas.getContext('2d');
            setOverlay('Mulai challenge registrasi...');

            let stage = 'blink';
            let blinkState = 'waitOpen';
            let headBase = null;
            let smileBase = null;

            for (let i = 0; i < cfg.maxLoop; i++) {
                const state = await detectSingleWithGuide(ctx, size);
                if (!state.ok) {
                    setOverlay(state.reason, 'rgba(217,119,6,0.9)');
                    await sleep(cfg.intervalMs);
                    continue;
                }

                const landmarks = state.landmarks;
                if (stage === 'blink') {
                    const ear = calcEar(landmarks);
                    setOverlay('Tahap 1: Kedip 1x');
                    if (blinkState === 'waitOpen' && ear > cfg.blinkOpen) blinkState = 'waitClose';
                    else if (blinkState === 'waitClose' && ear < cfg.blinkClose) blinkState = 'waitOpenAgain';
                    else if (blinkState === 'waitOpenAgain' && ear > cfg.blinkOpen) {
                        setOverlay('Menyimpan tahap 1...', 'rgba(5,150,105,0.9)');
                        await postImage('register', name);
                        stage = 'head';
                        await sleep(400);
                    }
                } else if (stage === 'head') {
                    const yaw = calcYaw(landmarks);
                    setOverlay('Tahap 2: Gerakkan kepala kiri/kanan');
                    if (headBase === null) headBase = yaw;
                    else if (Math.abs(yaw - headBase) >= cfg.headMoveThreshold) {
                        setOverlay('Menyimpan tahap 2...', 'rgba(5,150,105,0.9)');
                        await postImage('register', name);
                        stage = 'smile';
                        await sleep(400);
                    }
                } else {
                    const smile = calcSmile(landmarks);
                    setOverlay('Tahap 3: Tersenyum');
                    if (smileBase === null) smileBase = smile;
                    else if (smile >= Math.max(smileBase * cfg.smileGain, cfg.smileMin)) {
                        setOverlay('Menyimpan tahap 3...', 'rgba(5,150,105,0.9)');
                        const data = await postImage('register', name);
                        setOverlay('Registrasi selesai!', 'rgba(5,150,105,0.9)');
                        setTimeout(() => setOverlay('', '', false), 900);
                        return data;
                    }
                }
                await sleep(cfg.intervalMs);
            }
            setOverlay('', '', false);
            throw new Error('Waktu registrasi habis. Coba lagi.');
        }

        function setBusy(busy) {
            el.btnRegister.disabled = busy || !modelsReady;
            el.btnRecognize.disabled = busy;
        }

        el.btnRegister.addEventListener('click', async () => {
            const name = el.inputName.value.trim();
            if (!name) return el.inputName.focus();
            if (!modelsReady) return logMessage('Model FE belum siap.', '#d97706');
            setBusy(true);
            try {
                const data = await runGuidedRegistration(name);
                logMessage(data, '#059669');
                el.inputName.value = '';
            } catch (e) {
                logMessage(e.message || 'Registrasi gagal.', '#dc2626');
            } finally {
                setBusy(false);
            }
        });

        el.btnRecognize.addEventListener('click', async () => {
            if (!modelsReady) return logMessage('Model FE belum siap.', '#d97706');
            setBusy(true);
            try {
                const size = getDisplaySize();
                faceapi.matchDimensions(el.canvas, size);
                const ctx = el.canvas.getContext('2d');
                for (let i = 0; i < 30; i++) {
                    const state = await detectSingleWithGuide(ctx, size);
                    if (state.ok) break;
                    setOverlay(state.reason, 'rgba(217,119,6,0.9)');
                    if (i === 29) throw new Error('Wajah belum center & close-up.');
                    await sleep(cfg.intervalMs);
                }
                const data = await postImage('recognize');
                setOverlay('', '', false);
                if (data.match_found) {
                    logMessage(`✅ IDENTITAS DIKENALI!\n\nNama: ${data.name}\nJarak: ${data.distance}\nPesan: ${data.message}`, '#059669');
                } else {
                    logMessage(`❌ IDENTITAS TIDAK DIKENALI.\n\nPesan: ${data.message}`, '#dc2626');
                }
            } catch (e) {
                logMessage(e.message || 'Pengenalan gagal.', '#dc2626');
            } finally {
                setBusy(false);
            }
        });

        window.addEventListener('load', async () => {
            setBusy(true);
            logMessage('Inisialisasi kamera dan model FE...', '#2563eb');
            try {
                await startCamera();
                await loadModels();
                logMessage('Sistem siap.', '#059669');
            } catch (e) {
                logMessage(`Gagal inisialisasi: ${e.message}`, '#dc2626');
            } finally {
                setBusy(false);
            }
        });
    </script>
</body>
</html>
